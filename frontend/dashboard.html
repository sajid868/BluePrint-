<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
display:flex;
background:#f5f7fb;
}

.sidebar{

width:250px;
height:100vh;
background:#111827;
color:white;
padding:30px;

}

.logo{

font-size:30px;
font-weight:800;
margin-bottom:40px;
color:#E53935;

}

.menu a{

display:block;
color:white;
text-decoration:none;
padding:14px 15px;
margin-bottom:10px;
border-radius:10px;

}

.menu a:hover{

background:#1f2937;

}

.main{

flex:1;
padding:40px;

}

h1{

margin-bottom:25px;

}

.cards{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;

}

.card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.card h2{

font-size:32px;
color:#E53935;
margin-top:10px;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

Blueprint

</div>

<div class="menu">

<a href="#">🏠 Dashboard</a>

<a href="#">👨‍🎓 Students</a>

<a href="#">📄 Results</a>

<a href="#">📤 Excel Upload</a>

<a href="#">📊 Analytics</a>

<a href="#">⚙ Settings</a>

</div>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">

Total Students

<h2>0</h2>

</div>

<div class="card">

Published Results

<h2>0</h2>

</div>

<div class="card">

Average GPA

<h2>0.00</h2>

</div>

<div class="card">

Pass Rate

<h2>0%</h2>

</div>

</div>

</div>

</body>
</html>
