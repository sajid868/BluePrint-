<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#f7f8fb;
color:#111827;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 8%;
background:#fff;
box-shadow:0 2px 12px rgba(0,0,0,.05);
}

.logo{
font-size:32px;
font-weight:800;
color:#E53935;
}

nav a{
text-decoration:none;
margin-left:28px;
color:#444;
font-weight:600;
}

.hero{
padding:90px 8%;
display:flex;
justify-content:space-between;
align-items:center;
gap:50px;
}

.left{
max-width:620px;
}

.left h1{
font-size:60px;
line-height:1.15;
margin-bottom:20px;
}

.left span{
color:#E53935;
}

.left p{
font-size:20px;
line-height:1.7;
color:#666;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:15px 30px;
background:#E53935;
color:#fff;
text-decoration:none;
border-radius:12px;
font-weight:700;
}

.card{
background:#fff;
width:450px;
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:15px;
border:none;
background:#E53935;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

footer{
padding:40px;
text-align:center;
color:#777;
}
</style>

</head>

<body>

<header>

<div class="logo">
Blueprint
</div>

<nav>
<a href="#">Home</a>
<a href="#">Results</a>
<a href="#">Analytics</a>
<a href="#">Resources</a>
<a href="#">Login</a>
</nav>

</header>

<section class="hero">

<div class="left">

<h1>
Modern Academic Platform
for <span>Polytechnic Students</span>
</h1>

<p>

Results,
Analytics,
CGPA,
Study Resources,
Notice,
Career Tools —
সব এক জায়গায়।

</p>

<a href="#" class="btn">
Get Started
</a>

</div>

<div class="card">

<h2>Quick Result Search</h2>

<input placeholder="Roll">

<input placeholder="Registration">

<button>
Search Result
</button>

</div>

</section>

<footer>

© Blueprint 2026

</footer>

</body>
</html>
