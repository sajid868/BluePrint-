<!doctype html>
<html><head><meta charset="utf-8"><title>Blueprint - Students</title>
<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:10px}
input,button{padding:10px;margin:5px}
button{background:#d32f2f;color:#fff;border:none}
</style></head>
<body>
<h1>Student Management</h1>
<input id="name" placeholder="Student Name">
<input id="roll" placeholder="Roll">
<button onclick="add()">Add Student</button>
<table><thead><tr><th>Name</th><th>Roll</th></tr></thead>
<tbody id="tb"></tbody></table>
<script>
const students=[];
function add(){
 const n=name.value,r=roll.value;
 if(!n||!r)return;
 students.push({n,r});
 tb.innerHTML=students.map(s=>`<tr><td>${s.n}</td><td>${s.r}</td></tr>`).join('');
 name.value='';roll.value='';
}
</script>
</body></html>
