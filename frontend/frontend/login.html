<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint | Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.login-box{

width:420px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.08);

}

.logo{

text-align:center;
font-size:34px;
font-weight:800;
color:#E53935;
margin-bottom:10px;

}

.sub{

text-align:center;
color:#666;
margin-bottom:35px;

}

input{

width:100%;
padding:15px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;

}

button{

width:100%;
padding:15px;
background:#E53935;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;

}

button:hover{

background:#d32f2f;

}

.footer{

margin-top:20px;
text-align:center;
font-size:13px;
color:#888;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
Blueprint
</div>

<div class="sub">
Administrator Login
</div>

<input
type="email"
placeholder="Email Address">

<input
type="password"
placeholder="Password">

<button>

Login

</button>

<div class="footer">

Blueprint © 2026

</div>

</div>

</body>
</html>
